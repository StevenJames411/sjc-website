<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Slide 02 — Hustle Trap</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --sjc-blue: #2563eb;
    --sjc-navy: #1e3a6e;
    --sjc-ink: #111827;
    --sjc-mute: #4b5563;
    --sjc-line: #e5e7eb;
    --sjc-bg-soft: #f3f4f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    font-family: "Lexend", ui-sans-serif, system-ui, sans-serif;
    background: var(--sjc-bg-soft);
    color: var(--sjc-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 200px;
  }
  .card {
    background: #fff;
    border: 1px solid var(--sjc-line);
    border-radius: 32px;
    box-shadow: 0 24px 60px -28px rgba(15, 31, 61, 0.28);
    padding: 96px 128px;
    width: 100%;
    max-width: 1480px;
  }
  .pill {
    display: inline-block;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--sjc-blue);
    margin-bottom: 28px;
  }
  .lie {
    font-size: 88px;
    font-weight: 700;
    line-height: 1.05;
    color: var(--sjc-ink);
    text-decoration: line-through;
    text-decoration-color: var(--sjc-blue);
    text-decoration-thickness: 4px;
    margin-bottom: 80px;
    letter-spacing: -0.015em;
  }
  .truth-label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 22px;
  }
  .truth {
    font-size: 76px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--sjc-ink);
    letter-spacing: -0.01em;
  }
  .brand {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--sjc-mute);
    opacity: 0.55;
  }
</style>
</head>
<body>
  <div class="card">
    <p class="pill">Lie #4 &mdash; The Hustle Trap</p>
    <p class="lie">Hustle harder and you&rsquo;ll make it.</p>
    <p class="truth-label">The Truth</p>
    <p class="truth">You can&rsquo;t out-hustle<br/>a broken system.</p>
  </div>
  <div class="brand">stevenjames.consulting</div>
</body>
</html>
