<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Slide 04 — CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --sjc-blue: #2563eb;
    --sjc-navy: #1e3a6e;
    --sjc-green: #22c55e;
    --sjc-ink: #111827;
    --sjc-mute: #4b5563;
    --sjc-line: #e5e7eb;
    --sjc-bg-soft: #f3f4f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    font-family: "Lexend", ui-sans-serif, system-ui, sans-serif;
    background: var(--sjc-navy);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 160px;
    background-image: radial-gradient(circle at 30% 25%, rgba(37, 99, 235, 0.45), transparent 55%),
                      radial-gradient(circle at 75% 80%, rgba(34, 197, 94, 0.18), transparent 55%);
  }
  .wrap { max-width: 1480px; }
  .eyebrow {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.75);
    margin-bottom: 40px;
  }
  h1 {
    font-size: 168px;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin-bottom: 28px;
  }
  .sub {
    font-size: 44px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.25;
    max-width: 1300px;
    margin: 0 auto 80px;
  }
  .button {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    background: var(--sjc-blue);
    color: #fff;
    border-radius: 18px;
    padding: 36px 72px;
    box-shadow: 0 24px 60px -20px rgba(37, 99, 235, 0.55);
  }
  .button .main {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .button .secondary {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 10px;
  }
  .url {
    margin-top: 80px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
  }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">If this hit a nerve&hellip;</p>
    <h1>Count your hats.</h1>
    <p class="sub">In 60 seconds we&rsquo;ll show you which seats you&rsquo;re holding &mdash; and which ones an AI employee can take off your plate.</p>
    <div class="button">
      <span class="main">Take the audit</span>
      <span class="secondary">60-Second Org Chart Audit</span>
    </div>
    <p class="url">stevenjames.consulting / assessment</p>
  </div>
</body>
</html>
